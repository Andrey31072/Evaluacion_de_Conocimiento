databaseChangeLog:
  - changeSet:
      id: 0001-create-extension-pgcrypto
      author: Kevin Andrey Culam Gomez
      description: Crear extensión pgcrypto para UUIDs y hashing
      changes:
        - sql:
            sql: "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
            endDelimiter: ;
            splitStatements: true
      rollback:
        - sql:
            sql: "DROP EXTENSION IF EXISTS pgcrypto;"
            endDelimiter: ;